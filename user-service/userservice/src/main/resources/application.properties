# ==============================
# 📦 APP CONFIG
# ==============================
spring.application.name=user-service
server.port=8084
server.forward-headers-strategy=framework
# ==============================
# 🗄️ DATABASE CONFIG (MySQL)
# ==============================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/user_login?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# ⚙️ JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# (Tùy chọn: bỏ nếu dùng Hibernate auto-detect)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# 🔐 JWT
# ==============================
jwt.secret=4R8sK9v2rQxW7yZpB3nL0aF6hTq8uVxYz1mN2bC3dE4fG5h

# ==============================
# 🐇 RABBITMQ CONFIG (for event publish)
# ==============================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Tên exchange thống nhất giữa user-service, wallet-service, transaction-service
mq.exchange=ev.exchange

# ==============================
# 🔑 GOOGLE OAUTH2 CONFIG
# ==============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account
spring.security.oauth2.client.registration.google.provider=google
app.frontend.redirect-after-login=http://localhost:9000/oauth-success.html
